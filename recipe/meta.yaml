{% set name = "django-mptt" %}
{% set version = "0.17.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/django_mptt-{{ version }}.tar.gz
  sha256: e2dca00536450b91bdc80d8fc1454993b84307728394ae42c72947fc09574d3d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - django >=3.2
    - django-js-asset

test:
  imports:
    - mptt
    - mptt.templatetags
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/django-mptt/django-mptt
  summary: Utilities for implementing Modified Preorder Tree Traversal with your Django Models and working with trees of Model instances.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: Utilities for implementing Modified Preorder Tree Traversal with your Django Models and working with trees of Model instances.
  doc_url: https://django-mptt.readthedocs.io/
  dev_url: https://github.com/django-mptt/django-mptt

extra:
  recipe-maintainers:
    - cshaley
    - sannykr
    - rxm7706
    - MichelML
